<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="麗晨報工">
<meta name="theme-color" content="#1a56a0">
<title>麗晨企業廠 · 報工系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;font-size:14px;color:#1a1a1a;background:#f0f4fb;min-height:100vh}
input,select,textarea{font-family:inherit;font-size:14px;color:#1a1a1a;background:#fff;border:1px solid #d1d5db;border-radius:8px;padding:8px 10px;width:100%;outline:none;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:#1a56a0;box-shadow:0 0 0 3px rgba(26,86,160,.12)}
.btn{padding:9px 16px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;border:none}
.btn-p{background:#1a56a0;color:#fff}.btn-p:active{background:#154280}
.btn-p:disabled{background:#93c5fd;cursor:not-allowed}
.btn-g{background:#fff;color:#6b7280;border:1px solid #d1d5db}
.btn-dsm{background:transparent;color:#b91c1c;border:1px solid #fca5a5;font-size:11px;padding:3px 8px;border-radius:6px;cursor:pointer}
.btn-ok{background:#15803d;color:#fff;font-size:11px;padding:3px 9px;border-radius:6px;border:none;cursor:pointer}
.btn-edit{background:transparent;color:#1a56a0;border:1px solid #bfdbfe;font-size:11px;padding:3px 8px;border-radius:6px;cursor:pointer}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:1rem 1.25rem}
.bdg{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.b-bl{color:#1e3a8a;background:#dbeafe}.b-gr{color:#166534;background:#dcfce7}
.b-am{color:#78350f;background:#fef3c7}.b-gy{color:#374151;background:#f3f4f6}
.b-pu{color:#6b21a8;background:#f3e8ff}.b-rd{color:#991b1b;background:#fee2e2}
.pill{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500;white-space:nowrap}
.p-a{background:#dbeafe;color:#1e3a8a}.p-w{background:#fef3c7;color:#78350f}
.p-l{background:#f3e8ff;color:#6b21a8}.p-o{background:#f3f4f6;color:#374151}
.p-lv{background:#fee2e2;color:#991b1b}.p-rs{background:#e0e7ff;color:#3730a3}
.p-ds{background:#fce7f3;color:#9d174d}.p-fc{background:#ecfdf5;color:#065f46}.p-ot{background:#fef9c3;color:#713f12}
.sb{width:118px;min-height:100vh;border-right:1px solid #e5e7eb;background:#f9fafb;flex-shrink:0;padding:8px 0}
.mi{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;font-size:13px;color:#6b7280;border-left:3px solid transparent;user-select:none}
.mi:hover{background:#fff}.mi.on{background:#fff;color:#1a56a0;font-weight:600;border-left-color:#1a56a0}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:7px 8px;text-align:left;font-weight:600;color:#6b7280;border-bottom:1px solid #e5e7eb;white-space:nowrap;background:#f9fafb}
.tbl td{padding:7px 8px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
/* 師傅手機版 */
.ww{max-width:460px;margin:0 auto;padding:16px}
.bbtn{width:100%;padding:16px;font-size:16px;font-weight:700;border-radius:12px;border:none;cursor:pointer;background:#1a56a0;color:#fff}
.bbtn:active{background:#154280}.bbtn:disabled{background:#93c5fd;cursor:not-allowed}
/* 多筆報工列 */
.log-row{background:#f9fafb;border-radius:10px;margin-bottom:10px;border:1px solid #e5e7eb;padding:10px 12px}
.add-row-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border:1.5px dashed #93c5fd;border-radius:10px;background:#f0f7ff;color:#1a56a0;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:12px}
.mrow{padding:12px 14px;border-radius:10px;background:#f9fafb;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:8px}
/* 可搜尋下拉 */
.search-select{position:relative}
.search-select input{border-radius:8px}
.ss-dropdown{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #d1d5db;border-radius:8px;max-height:200px;overflow-y:auto;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.1);display:none}
.ss-dropdown.open{display:block}
.ss-opt{padding:8px 12px;cursor:pointer;font-size:13px}
.ss-opt:hover,.ss-opt.active{background:#dbeafe;color:#1e3a8a}
.ss-opt.empty{color:#9ca3af;cursor:default}
/* 每日總覽 */
.day-block{margin-bottom:12px}
.day-header{font-size:13px;font-weight:600;padding:8px 12px;background:#f3f4f6;border-radius:8px 8px 0 0;border:1px solid #e5e7eb;border-bottom:none;display:flex;align-items:center;gap:8px}
.day-body{border:1px solid #e5e7eb;border-radius:0 0 8px 8px;overflow:hidden}
.worker-row{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid #f3f4f6;gap:8px;flex-wrap:wrap}
.worker-row:last-child{border-bottom:none}
.hour-bar{height:6px;border-radius:3px;background:#e5e7eb;width:80px;overflow:hidden;flex-shrink:0}
.hour-fill{height:100%;border-radius:3px}
/* lbl */
.lbl{font-size:12px;color:#6b7280;margin-bottom:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.spin{text-align:center;padding:2.5rem;color:#9ca3af;font-size:13px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;pointer-events:none;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.cb{border-radius:8px;padding:.85rem 1rem;flex:1;min-width:80px}
/* 編輯彈窗 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:12px;padding:1.5rem;width:100%;max-width:400px}
</style>
</head>
<body>
<div id="root"></div>
<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbwui-6LcNje3v0KoSfoRUTZIKwEr_uoVEBCJFY2HLHctmRHdpndk1CZZ97E67zeUmU9og/exec';

async function gas(action,body){
  var res=await fetch(GAS_URL,{method:'POST',body:JSON.stringify(Object.assign({action:action},body||{})),headers:{'Content-Type':'text/plain'}});
  var data=await res.json();if(data.error)throw new Error(data.error);return data;
}

function today(){var d=new Date();return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}
function p2(n){return n<10?'0'+n:String(n);}
function toast(msg,ms){
  ms=ms||2500;var el=document.createElement('div');el.className='toast';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(function(){el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(function(){el.remove();},300);},ms);
}
function $id(id){return document.getElementById(id);}
var TP={組裝:'p-a',焊接:'p-w',車床:'p-l'};
var CP={組裝:'p-a',焊接:'p-w',車床:'p-l',出車:'p-o',外出:'p-o',設計:'p-ds',結採:'p-fc',其他:'p-ot',請假:'p-lv',排休:'p-rs'};
var ALL_CATS=['組裝','焊接','車床','出車','設計','結採','其他','請假','排休'];
var NO_JOB_CATS=['請假','排休','其他','設計','結採','出車'];

var S={page:'login',user:null,fJob:'',fWorker:''};
var C={jobs:null,workers:null};
var wRows=[{job_id:'',hours:8,category:'組裝',note:'',sub_items:[]}];
var mRows=[{job_id:'',hours:8,category:'組裝',note:'',sub_items:[]}];
var editLog=null; // 正在編輯的記錄

function getUser(){try{return JSON.parse(localStorage.getItem('lc_u')||'null');}catch{return null;}}
function saveUser(u){localStorage.setItem('lc_u',JSON.stringify(u));}
function clearUser(){localStorage.removeItem('lc_u');}

async function cJobs(inprog){if(!C.jobs)C.jobs=(await gas('getJobs',{})).data;return inprog?C.jobs.filter(function(j){return j.status==='進行中';}):C.jobs;}
async function cWorkers(){if(!C.workers)C.workers=(await gas('getWorkers',{})).data;return C.workers;}
function bust(){C.jobs=null;C.workers=null;}

function render(page,params){
  if(page)S.page=page;if(params)Object.assign(S,params);
  var root=$id('root');root.innerHTML='';
  if(!S.user){root.innerHTML=renderLogin();return;}
  if(S.user.role==='worker')root.innerHTML=renderWorkerShell();
  else root.innerHTML=renderMgrShell();
  loadPage();
}

// ── 登入 ─────────────────────────────────────────────────────
function renderLogin(){
  return '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#e8eef8;padding:16px">'
    +'<div class="card" style="width:100%;max-width:320px;padding:2rem">'
    +'<div style="text-align:center;margin-bottom:1.5rem">'
    +'<div style="width:52px;height:52px;background:#1a56a0;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;margin:0 auto 10px">麗</div>'
    +'<div style="font-size:17px;font-weight:700">麗晨企業廠</div>'
    +'<div style="font-size:12px;color:#9ca3af;margin-top:2px">工時報工系統</div>'
    +'</div>'
    +'<div style="margin-bottom:10px"><div class="lbl">身份</div>'
    +'<div style="display:flex;gap:6px">'
    +[['worker','師傅'],['admin','生管'],['boss','老闆']].map(function(r){
      return '<button id="rb-'+r[0]+'" onclick="setLR(\''+r[0]+'\')" class="btn btn-g" style="flex:1;font-size:13px;padding:8px 4px">'+r[1]+'</button>';
    }).join('')+'</div></div>'
    +'<div id="lhint" style="font-size:11px;color:#9ca3af;margin-bottom:12px;padding:6px 10px;background:#f9fafb;border-radius:6px">請選擇身份</div>'
    +'<div style="margin-bottom:10px"><div class="lbl">帳號</div><input id="lu" placeholder="帳號" autocomplete="username"></div>'
    +'<div style="margin-bottom:16px"><div class="lbl">密碼</div><input id="lp" type="password" placeholder="密碼" onkeydown="if(event.key===\'Enter\')doLogin()"></div>'
    +'<button class="btn btn-p" style="width:100%;padding:12px;font-size:15px" onclick="doLogin()">登入</button>'
    +'<div id="lerr" style="color:#b91c1c;font-size:12px;margin-top:8px;text-align:center;min-height:16px"></div>'
    +'</div></div>';
}
var LR='worker';
function setLR(r){
  LR=r;
  var hints={worker:'師傅：選機號填工時，支援一次多筆',admin:'生管：代填、審核、機號管理、每日總覽',boss:'老闆：成本查詢'};
  var h=$id('lhint');if(h)h.textContent=hints[r];
  ['worker','admin','boss'].forEach(function(k){
    var el=$id('rb-'+k);if(!el)return;
    var s=k===r;el.style.borderColor=s?'#1a56a0':'#d1d5db';el.style.color=s?'#1a56a0':'#6b7280';
    el.style.fontWeight=s?'600':'400';el.style.background=s?'#dbeafe':'#fff';
  });
}
async function doLogin(){
  var id=($id('lu').value||'').trim(),pw=($id('lp').value||'').trim(),err=$id('lerr');
  if(!id||!pw){err.textContent='請填寫帳號與密碼';return;}
  err.textContent='登入中...';
  try{
    var d=await gas('login',{id:id,password:pw});
    if(d.user.role!==LR){err.textContent='帳號身份不符';return;}
    S.user=d.user;saveUser(d.user);
    S.page=d.user.role==='worker'?'w-report':(d.user.role==='boss'?'cost':'daily');
    bust();render();
  }catch(e){err.textContent=e.message;}
}
function doLogout(){clearUser();S.user=null;S.page='login';bust();wRows=[{job_id:'',hours:8,category:'組裝',note:'',sub_items:[]}];mRows=[{job_id:'',hours:8,category:'組裝',note:'',sub_items:[]}];render();}

// ── 可搜尋下拉元件 ─────────────────────────────────────────────
function searchSelect(id,jobs,selectedId,onchange){
  var sel=jobs.find(function(j){return j.id===selectedId;});
  var display=sel?sel.id+' '+sel.customer:'';
  return '<div class="search-select" id="ss-wrap-'+id+'">'
    +'<input id="ss-input-'+id+'" value="'+display+'" placeholder="輸入機號或客戶名稱搜尋..." autocomplete="off" '
    +'onfocus="openSS(\''+id+'\')" oninput="filterSS(\''+id+'\')" onblur="closeSS(\''+id+'\')">'
    +'<div class="ss-dropdown" id="ss-drop-'+id+'">'
    +jobs.map(function(j){
      return '<div class="ss-opt'+(j.id===selectedId?' active':'')+'" '
        +'onmousedown="selectSS(\''+id+'\',\''+j.id+'\',\''+j.id+' '+j.customer.replace(/'/g,'')+'\','+onchange+')">'
        +'<strong>'+j.id+'</strong> '+j.customer+'</div>';
    }).join('')
    +'</div></div>';
}
function openSS(id){var d=$id('ss-drop-'+id);if(d){d.classList.add('open');$id('ss-input-'+id).select();}}
function closeSS(id){setTimeout(function(){var d=$id('ss-drop-'+id);if(d)d.classList.remove('open');},200);}
function filterSS(id){
  var q=($id('ss-input-'+id).value||'').toLowerCase();
  var d=$id('ss-drop-'+id);if(!d)return;
  d.classList.add('open');
  d.querySelectorAll('.ss-opt').forEach(function(el){
    el.style.display=el.textContent.toLowerCase().includes(q)?'':'none';
  });
}
function selectSS(id,jid,display,cb){
  var inp=$id('ss-input-'+id);if(inp)inp.value=display;
  if(cb)cb(jid);
  closeSS(id);
}

// ── 師傅 Shell ───────────────────────────────────────────────
function renderWorkerShell(){
  return '<div style="max-width:460px;margin:0 auto;min-height:100vh;background:#fff">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #e5e7eb;background:#fff;position:sticky;top:0;z-index:10">'
    +'<div style="display:flex;align-items:center;gap:8px">'
    +'<div style="width:28px;height:28px;background:#1a56a0;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:12px">麗</div>'
    +'<div><div style="font-size:14px;font-weight:700">'+S.user.name+'</div>'
    +'<div style="font-size:11px;color:#9ca3af">'+S.user.work_type+'　'+today()+'</div></div>'
    +'</div><button class="btn btn-g" style="font-size:12px;padding:5px 10px" onclick="doLogout()">登出</button></div>'
    +'<div style="display:flex;border-bottom:1px solid #e5e7eb">'
    +[['w-report','今日報工'],['w-history','我的記錄']].map(function(t){
      var on=S.page===t[0];
      return '<div onclick="render(\''+t[0]+'\')" style="flex:1;text-align:center;padding:11px;font-size:13px;cursor:pointer;border-bottom:2px solid '+(on?'#1a56a0':'transparent')+';color:'+(on?'#1a56a0':'#6b7280')+';font-weight:'+(on?'600':'400')+'">'+t[1]+'</div>';
    }).join('')+'</div>'
    +'<div class="ww" id="wc"><div class="spin">載入中...</div></div></div>';
}

// ── 生管/老闆 Shell ───────────────────────────────────────────
function renderMgrShell(){
  var role=S.user.role;
  var nav=role==='boss'
    ?[['cost','▣','成本查詢'],['jobs','□','機號總覽']]
    :[['daily','📅','每日總覽'],['approve','✓','待審核'],['report-mgr','＋','代填報工'],
      ['logs','≡','報工記錄'],['jobs','□','機號管理'],['workers','♦','師傅名單'],['cost','▣','成本查詢']];
  return '<div>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #e5e7eb;background:#fff;position:sticky;top:0;z-index:10">'
    +'<div style="display:flex;align-items:center;gap:10px">'
    +'<div style="width:28px;height:28px;background:#1a56a0;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:12px">麗</div>'
    +'<div style="font-size:13px;font-weight:600">麗晨企業廠 · 工時報工</div></div>'
    +'<div style="display:flex;align-items:center;gap:8px">'
    +'<span class="bdg '+(role==='boss'?'b-pu':'b-bl')+'">'+S.user.name+'</span>'
    +'<button class="btn btn-g" style="font-size:12px;padding:4px 10px" onclick="doLogout()">登出</button>'
    +'</div></div>'
    +'<div style="display:flex"><div class="sb">'
    +nav.map(function(n){return '<div class="mi'+(S.page===n[0]?' on':'')+'" onclick="render(\''+n[0]+'\')"><span style="font-size:11px;width:14px;flex-shrink:0">'+n[1]+'</span>'+n[2]+'</div>';}).join('')
    +'</div><div style="flex:1;padding:16px;min-width:0" id="mc"><div class="spin">載入中...</div></div></div></div>';
}

async function loadPage(){
  var el=S.user.role==='worker'?$id('wc'):$id('mc');
  if(!el)return;
  el.innerHTML='<div class="spin">載入中...</div>';
  try{
    var html='';
    if(S.page==='w-report')    html=await pageWReport();
    else if(S.page==='w-history')  html=await pageWHistory();
    else if(S.page==='daily')  html=await pageDaily();
    else if(S.page==='approve')html=await pageApprove();
    else if(S.page==='report-mgr') html=await pageReportMgr();
    else if(S.page==='logs')   html=await pageLogs();
    else if(S.page==='jobs')   html=await pageJobs();
    else if(S.page==='workers')html=await pageWorkers();
    else if(S.page==='cost')   html=await pageCost();
    el.innerHTML=html;
    if(editLog) showEditModal();
  }catch(e){el.innerHTML='<div style="color:#b91c1c;padding:1rem">錯誤：'+e.message+'</div>';}
}

// ════════════════════════════════════════════════════════════════
//  師傅：今日報工（多筆 + 備註 + 請假/排休）
// ════════════════════════════════════════════════════════════════
async function pageWReport(){
  var myLogs=(await gas('getLogs',{worker_id:S.user.id,date_from:today(),date_to:today()})).data;
  var todayH=myLogs.reduce(function(a,l){return a+l.hours;},0);
  var jlist=await cJobs(true);

  var rowsHtml=wRows.map(function(r,i){
    var needJob=NO_JOB_CATS.indexOf(r.category)===-1;
    return '<div class="log-row">'
      +'<div class="g2" style="margin-bottom:8px">'
      +'<div><div class="lbl">類別</div>'
      +'<select style="font-size:13px" onchange="setWRow('+i+',\'category\',this.value);reloadWRows()">'
      +ALL_CATS.map(function(c){return '<option'+(r.category===c?' selected':'')+'>'+c+'</option>';}).join('')
      +'</select></div>'
      +'<div><div class="lbl">工時（小時）</div>'
      +'<input type="number" value="'+r.hours+'" step="0.5" min="0.5" max="12" style="font-size:16px;font-weight:700;text-align:center" onchange="setWRow('+i+',\'hours\',parseFloat(this.value)||8)">'
      +'</div></div>'
      +(needJob?'<div style="margin-bottom:8px"><div class="lbl">機號</div>'+searchSelect('wr-'+i,jlist,r.job_id,'function(v){setWRow('+i+',\'job_id\',v);}')+'</div>':'')
      +(r.category==='出車'?renderSubItems('wr',i,r.sub_items||[],jlist):'')
      +'<div style="display:flex;gap:8px;align-items:flex-end">'
      +'<div style="flex:1"><div class="lbl">備註（選填）</div><input type="text" value="'+(r.note||'')+'" placeholder="如：試運轉" onchange="setWRow('+i+',\'note\',this.value)"></div>'
      +(wRows.length>1?'<button class="btn-dsm" style="margin-bottom:1px" onclick="removeWRow('+i+')">移除</button>':'')
      +'</div></div>';
  }).join('');

  var totalH=wRows.reduce(function(a,r){return a+(parseFloat(r.hours)||0);},0);

  var todayRowsHtml=myLogs.map(function(l){
    return '<div class="mrow"><div>'
      +'<div style="font-size:13px;font-weight:600">'+(l.customer||l.category)+'</div>'
      +'<div style="font-size:11px;color:#9ca3af;margin-top:2px">'
      +'<span class="pill '+(CP[l.category]||'p-o')+'">'+l.category+'</span>'
      +(l.note?' · '+l.note:'')
      +'</div></div>'
      +'<div style="display:flex;align-items:center;gap:8px">'
      +'<span style="font-size:18px;font-weight:700;color:#1a56a0">'+l.hours+'h</span>'

//  每日工時總覽
// ════════════════════════════════════════════════════════════════
async function pageDaily(){
  var d=await gas('getDailySum',{days:14});
  var map=d.data, workers=d.workers;
  var dates=Object.keys(map).sort().reverse();

  if(!dates.length) return '<div style="font-size:15px;font-weight:700;margin-bottom:14px">每日工時總覽</div><div class="card" style="text-align:center;padding:2rem;color:#9ca3af">近14天無資料</div>';

  var h='<div style="font-size:15px;font-weight:700;margin-bottom:6px">每日工時總覽</div>'
    +'<div style="font-size:12px;color:#9ca3af;margin-bottom:14px">近 14 天 · 點日期展開 · 工時 < 8h 標紅（請假/排休除外）</div>';

  dates.forEach(function(date,di){
    var dayData=map[date];
    var reportCount=Object.keys(dayData).length;
    var isOpen=di===0; // 預設只展開最新一天
    var domId='day-'+date.replace(/-/g,'');

    // 計算當天整體狀態
    var hasWarn=false;
    workers.forEach(function(w){
      var wd=dayData[w.id]||null;
      if(wd&&!wd.leave&&!wd.rest&&wd.hours<8) hasWarn=true;
    });

    h+='<div class="day-block">'
      +'<div class="day-header" onclick="toggleDay(\''+domId+'\')" style="cursor:pointer;justify-content:space-between">'
      +'<div style="display:flex;align-items:center;gap:8px">'
      +'<span id="arr-'+domId+'" style="font-size:10px;transition:transform .2s;display:inline-block;transform:'+(isOpen?'rotate(90deg)':'rotate(0deg)')+'">▶</span>'
      +fmtDate(date)
      +(hasWarn?'<span style="font-size:11px;color:#dc2626">⚠ 有異常</span>':'<span style="font-size:11px;color:#16a34a">✓</span>')
      +'</div>'
      +'<span style="font-size:11px;font-weight:400;color:#9ca3af">'+reportCount+' 人報工</span>'
      +'</div>'
      +'<div class="day-body" id="'+domId+'" style="display:'+(isOpen?'block':'none')+'">';

    workers.forEach(function(w){
      var wd=dayData[w.id]||null;
      var h8=wd?wd.hours:0;
      var isLeave=wd&&wd.leave;
      var isRest=wd&&wd.rest;
      var isOk=isLeave||isRest||(h8>=8);
      var noReport=!wd;
      var hasChecked=wd&&wd.checkedCount>0;
      var barColor=isOk?'#16a34a':(h8>0?'#f59e0b':'#e5e7eb');
      var pct=Math.min(100,(h8/8)*100);

      h+='<div class="worker-row">'
        +'<div style="font-size:13px;font-weight:600;min-width:56px">'+w.name+'</div>';

      if(noReport){
        h+='<span style="font-size:12px;color:#d1d5db">未報工</span>';
      } else if(isLeave){
        h+='<span class="bdg b-rd">請假</span>';
      } else if(isRest){
        h+='<span class="bdg" style="background:#e0e7ff;color:#3730a3">排休</span>';
      } else {
        h+='<div class="hour-bar"><div class="hour-fill" style="width:'+pct+'%;background:'+barColor+'"></div></div>';
        h+='<span style="font-size:13px;font-weight:600;color:'+(isOk?'#166534':'#dc2626')+'">'+h8+'h</span>';
        if(!isOk) h+='<span style="font-size:11px;color:#dc2626">⚠ 不足8h</span>';
        if(hasChecked) h+='<span style="font-size:13px;color:#166534" title="有核銷記錄">✓</span>';
      }
      h+='</div>';
    });
    h+='</div></div>';
  });

  // 折疊控制函式（加在 HTML 裡）
  
  return h;
}

// 日期格式：統一輸出 YYYY/M/D(週)
var WEEKDAYS=['日','一','二','三','四','五','六'];
function fmtDate(d){
  if(!d) return '';
  var s=String(d),dt;
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)){
    var parts=s.split('-');
    dt=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  } else if(s.includes('T')||s.includes('Z')){
    var tmp=new Date(s);
    if(isNaN(tmp.getTime())) return s;
    // 轉台灣時間
    dt=new Date(tmp.toLocaleString('en-US',{timeZone:'Asia/Taipei'}));
  } else {
    return s.slice(0,10);
  }
  var y=dt.getFullYear(),m=dt.getMonth()+1,day=dt.getDate(),w=WEEKDAYS[dt.getDay()];
  return y+'/'+m+'/'+day+'('+w+')';
}
// 給 input[type=date] 用的純 YYYY-MM-DD
function fmtDateISO(d){
  if(!d) return '';
  var s=String(d);
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  if(s.includes('T')||s.includes('Z')){
    var tmp=new Date(s);
    if(isNaN(tmp.getTime())) return s;
    var dt2=new Date(tmp.toLocaleString('en-US',{timeZone:'Asia/Taipei'}));
    return dt2.getFullYear()+'-'+p2(dt2.getMonth()+1)+'-'+p2(dt2.getDate());
  }
  return s.slice(0,10);
}

  var jo='<option value="">全部機號</option>'+jlist.map(function(j){return '<option value="'+j.id+'"'+(S.fJob===j.id?' selected':'')+'>'+j.id+' '+j.customer+'</option>';}).join('');
  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'
    +'<div style="font-size:15px;font-weight:700">報工記錄</div>'
    +'<button class="btn btn-p" onclick="render(\'report-mgr\')">＋ 代填</button></div>'
    +'<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">'
    +'<select style="font-size:12px;padding:4px 8px;width:auto" id="fw" onchange="doF()">'+wo+'</select>'
    +'<select style="font-size:12px;padding:4px 8px;width:auto" id="fj" onchange="doF()">'+jo+'</select>'
    +(S.fWorker||S.fJob?'<button class="btn btn-g" style="font-size:12px;padding:4px 10px" onclick="clearF()">清除</button>':'')
    +'</div>'
    +'<div class="card"><div style="overflow:auto">'+logTbl(logList,false,false)+'</div></div>';
}
function doF(){S.fWorker=($id('fw')||{}).value||'';S.fJob=($id('fj')||{}).value||'';render('logs');}
function clearF(){S.fWorker='';S.fJob='';render('logs');}
async function delLog(id){if(!confirm('確定刪除？'))return;try{await gas('deleteLog',{id:id});toast('✓ 已刪除');render('logs');}catch(e){toast('❌ '+e.message);}}

function logTbl(rows,showApprove,showEdit){
  if(!rows.length)return '<div style="text-align:center;padding:1.5rem;color:#9ca3af;font-size:13px">無資料</div>';
  return '<table class="tbl"><thead><tr><th>日期</th><th>師傅</th><th>工種</th><th>機號</th><th>客戶</th><th>類別</th><th>工時</th><th>備註</th><th>狀態</th><th></th></tr></thead><tbody>'
    +rows.map(function(l){
      var logJson=encodeURIComponent(JSON.stringify(l));
      return '<tr>'
        +'<td style="white-space:nowrap">'+l.date+'</td>'
        +'<td style="font-weight:600;white-space:nowrap">'+l.worker_name+'</td>'
        +'<td><span class="pill '+(TP[l.work_type]||'p-a')+'">'+l.work_type+'</span></td>'
        +'<td style="font-family:monospace;font-size:10px;color:#1a56a0;white-space:nowrap">'+(l.job_id||'—')+'</td>'
        +'<td style="white-space:nowrap">'+(l.customer||'—')+'</td>'
        +'<td><span class="pill '+(CP[l.category]||'p-o')+'">'+l.category+'</span></td>'
        +'<td style="font-weight:600;text-align:right;padding-right:12px">'+l.hours+'h</td>'
        +'<td style="font-size:11px;color:#9ca3af;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(l.note||'')+'</td>'
        +'<td><span class="bdg '+(l.status==='approved'?'b-gr':'b-am')+'">'+(l.status==='approved'?'已核准':'待審核')+'</span></td>'
        +'<td style="white-space:nowrap;display:flex;gap:3px;align-items:center">'
        +(showEdit&&l.status==='pending'?'<button class="btn-edit" onclick="openEdit(\''+logJson+'\')">編輯</button>':'')
        +(showApprove&&l.status==='pending'?'<button class="btn-ok" onclick="approveOne(\''+l.id+'\')">核准</button>':'')
        +'<button class="btn-dsm" onclick="delLog(\''+l.id+'\')">刪</button>'
        +'</td></tr>';
    }).join('')+'</tbody></table>';
}

// ── 機號管理 ──────────────────────────────────────────────────
async function pageJobs(){
  var jl=await cJobs(),canEdit=S.user.role==='admin';
  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
    +'<div style="font-size:15px;font-weight:700">機號'+(canEdit?'管理':'總覽')+'</div>'
    +(canEdit?'<button class="btn btn-p" onclick="addJob()">＋ 新增機號</button>':'')
    +'</div><div style="display:grid;gap:8px">'
    +jl.map(function(j){
      return '<div class="card"><div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px">'
        +'<div><div style="font-size:14px;font-weight:700;color:#1a56a0;cursor:pointer" onclick="viewCost(\''+j.id+'\')">'+j.id+'</div>'
        +'<div style="font-size:12px;color:#9ca3af;margin-top:2px">'+j.customer+(j.description?'　'+j.description:'')+'</div></div>'
        +'<div style="display:flex;align-items:center;gap:8px"><span class="bdg '+(j.status==='進行中'?'b-bl':'b-gr')+'">'+j.status+'</span>'
        +(canEdit&&j.status==='進行中'?'<button class="btn-ok" onclick="closeJob(\''+j.id+'\')">結案</button>':'')
        +'</div></div>'
        +'<button onclick="viewCost(\''+j.id+'\')" style="font-size:11px;padding:3px 10px;border:1px solid #e5e7eb;border-radius:6px;background:#f9fafb;cursor:pointer;color:#1a56a0">查看工時 →</button>'
        +'</div>';
    }).join('')+'</div>';
}
function viewCost(id){S.fJob=id;render('cost');}
async function addJob(){
  var id=prompt('機號（格式 YYMMDD-NN，如 250506-01）：');if(!id)return;
  var customer=prompt('客戶名稱：');if(!customer)return;
  var desc=prompt('機台說明（選填）：')||'';
  try{await gas('addJob',{id:id.trim(),customer:customer.trim(),description:desc});toast('✓ 機號已新增');bust();render('jobs');}
  catch(e){toast('❌ '+e.message);}
}
async function closeJob(id){if(!confirm('確定結案 '+id+'？'))return;try{await gas('closeJob',{id:id});toast('✓ 已結案');bust();render('jobs');}catch(e){toast('❌ '+e.message);}}

// ── 師傅名單 ──────────────────────────────────────────────────
async function pageWorkers(){
  var wl=await cWorkers();
  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
    +'<div style="font-size:15px;font-weight:700">師傅名單</div>'
    +'<button class="btn btn-p" onclick="addWorker()">＋ 新增師傅</button></div>'
    +'<div class="card"><div style="overflow:auto"><table class="tbl"><thead><tr><th>帳號</th><th>姓名</th><th>工種</th><th>本月工時</th><th>操作</th></tr></thead><tbody>'
    +wl.map(function(w){
      return '<tr><td style="font-family:monospace;font-size:11px;color:#1a56a0">'+w.id+'</td><td style="font-weight:600">'+w.name+'</td>'
        +'<td><span class="pill '+(TP[w.work_type]||'p-a')+'">'+w.work_type+'</span></td>'
        +'<td style="font-weight:600">'+w.month_hours+'h</td>'
        +'<td><button class="btn-dsm" onclick="resetPw(\''+w.id+'\',\''+w.name+'\')">改密碼</button></td></tr>';
    }).join('')+'</tbody></table></div></div>';
}
async function addWorker(){
  var name=prompt('師傅姓名：');if(!name)return;
  var type=prompt('工種（組裝 / 焊接 / 車床）：');
  if(!type||!['組裝','焊接','車床'].includes(type)){toast('工種請輸入：組裝、焊接 或 車床');return;}
  var pw=prompt('初始密碼：');if(!pw)return;
  try{var r=await gas('addWorker',{name:name,work_type:type,password:pw});toast('✓ 已新增，帳號：'+r.id);bust();render('workers');}
  catch(e){toast('❌ '+e.message);}
}
async function resetPw(id,name){var pw=prompt(name+' 的新密碼：');if(!pw)return;try{await gas('resetPw',{id:id,password:pw});toast('✓ 密碼已更新');}catch(e){toast('❌ '+e.message);}}

// ── 成本查詢 ──────────────────────────────────────────────────
async function pageCost(){
  var jl=await cJobs();
  var h='<div style="font-size:15px;font-weight:700;margin-bottom:14px">成本查詢（按機號）</div>'
    +'<div class="card" style="margin-bottom:14px">'
    +'<div class="lbl">選擇機號（可輸入搜尋）</div>'
    +searchSelect('cost-sel',jl,S.fJob,'function(v){S.fJob=v;render(\'cost\');}')
    +'</div>';

  if(!S.fJob){return h+'<div style="text-align:center;padding:2rem;color:#9ca3af">請選擇機號</div>';}
  try{
    var d=await gas('getCost',{job_id:S.fJob});var s=d.summary;
    var ck=d.checked||{asm:0,weld:0,lathe:0,out:0,total:0};
    var boxDefs=[
      {l:'組裝工時',tot:s.asm,chk:ck.asm,bg:'#dbeafe',tc:'#1e3a8a'},
      {l:'焊接工時',tot:s.weld,chk:ck.weld,bg:'#fef3c7',tc:'#78350f'},
      {l:'車床工時',tot:s.lathe,chk:ck.lathe,bg:'#f3e8ff',tc:'#6b21a8'},
      {l:'出車工時',tot:s.out||0,chk:ck.out||0,bg:'#fff7ed',tc:'#9a3412'},
      {l:'其他工時',tot:s.other||0,chk:ck.other||0,bg:'#fef9c3',tc:'#713f12'},
      {l:'設計工時',tot:s.design||0,chk:ck.design||0,bg:'#fce7f3',tc:'#9d174d'},
      {l:'結採工時',tot:s.final_c||0,chk:ck.final_c||0,bg:'#ecfdf5',tc:'#065f46'},
    ];
    var boxes=boxDefs.map(function(b){
      return '<div class="cb" style="background:'+b.bg+';min-width:100px">'
        +'<div style="font-size:11px;color:'+b.tc+';margin-bottom:6px;font-weight:500">'+b.l+'</div>'
        +'<div style="font-size:20px;font-weight:700;color:'+b.tc+'">'+b.tot+'h</div>'
        +'<div style="font-size:11px;color:'+b.tc+';opacity:.7;margin-top:4px;border-top:1px solid rgba(0,0,0,.06);padding-top:4px">'
        +'核銷 <strong>'+b.chk+'h</strong></div>'
        +'</div>';
    }).join('');
    // 核銷提示
    var uncheckedCount=d.logs.filter(function(l){return l.tag!=='核銷';}).length;
    var tagSummary=uncheckedCount>0
      ?'<div style="padding:8px 12px;background:#fff7ed;border-radius:8px;margin-bottom:12px;font-size:12px;color:#9a3412">⚠ 有 '+uncheckedCount+' 筆標記為「未核銷」，工時合計不含這些筆</div>'
      :'';
    var lr=d.logs.map(function(l){
      var isChecked=(l.tag==='核銷');
      var tagBtn='<label style="display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none">'
        +'<input type="checkbox" '+(isChecked?'checked':'')+' onchange="setTag(\''+l.id+'\',this.checked?\'核銷\':\'未核銷\')" style="width:16px;height:16px;cursor:pointer;accent-color:#1a56a0">'
        +'<span style="font-size:11px;color:'+(isChecked?'#166534':'#9ca3af')+';font-weight:'+(isChecked?'500':'400')+'">'+( isChecked?'核銷':'未核銷')+'</span>'
        +'</label>';
      var rowStyle=isChecked?'':' style="opacity:.45"';
      return '<tr'+rowStyle+'><td style="white-space:nowrap">'+fmtDate(l.date)+'</td><td style="font-weight:600">'+l.worker_name+'</td><td><span class="pill '+(TP[l.work_type]||'p-a')+'">'+l.work_type+'</span></td><td><span class="pill '+(CP[l.category]||'p-o')+'">'+l.category+'</span></td><td style="font-weight:600">'+l.hours+'h</td><td style="font-size:11px;color:#9ca3af">'+(l.note||'')+'</td><td>'+tagBtn+'</td></tr>';
    }).join('');
    var wr=Object.entries(d.byWorker).map(function(e){
      var b=e[1];
      return '<tr>'
        +'<td style="font-weight:600">'+e[0]+'</td>'
        +'<td>'+(b.asm?b.asm+'h':'—')+'</td>'
        +'<td>'+(b.weld?b.weld+'h':'—')+'</td>'
        +'<td>'+(b.lathe?b.lathe+'h':'—')+'</td>'
        +'<td>'+(b.out?b.out+'h':'—')+'</td>'
        +'<td>'+(b.design?b.design+'h':'—')+'</td>'
        +'<td>'+(b.final_c?b.final_c+'h':'—')+'</td>'
        +'<td style="font-weight:700;color:#166534">'+b.total+'h</td></tr>';
    }).join('');
    h+='<div style="margin-bottom:12px"><div style="font-size:14px;font-weight:700">'+d.job.id+' — '+d.job.customer+'</div>'
      +'<div style="font-size:12px;color:#9ca3af">'+(d.job.description||'')+'　'+(d.job.created_at||'').slice(0,10)+'</div></div>'
      +'<div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">'+boxes+'</div>'
      +tagSummary
      +'<div style="font-size:13px;font-weight:600;color:#6b7280;margin-bottom:8px">工時明細 <span style="font-size:11px;font-weight:400;color:#9ca3af">（點擊「出機前」或「售後追加」標記每一筆）</span></div>'
      +'<div class="card" style="margin-bottom:14px"><div style="overflow:auto"><table class="tbl"><thead><tr><th>日期</th><th>師傅</th><th>工種</th><th>類別</th><th>工時</th><th>備註</th><th>標記</th></tr></thead>'
      +'<tbody>'+(lr||'<tr><td colspan="7" style="text-align:center;padding:1rem;color:#9ca3af">尚無工時</td></tr>')+'</tbody></table></div></div>'
      +(wr?'<div style="font-size:13px;font-weight:600;color:#6b7280;margin-bottom:8px">各師傅貢獻</div><div class="card"><table class="tbl"><thead><tr><th>師傅</th><th>組裝</th><th>焊接</th><th>車床</th><th>小計</th></tr></thead><tbody>'+wr+'</tbody></table></div>':'');
  }catch(e){h+='<div style="color:#b91c1c;padding:1rem">查詢失敗：'+e.message+'</div>';}
  return h;
}

// ── 每日總覽折疊 ─────────────────────────────────────────────
function toggleDay(id){
  var el=document.getElementById(id);
  var arr=document.getElementById('arr-'+id);
  if(!el)return;
  var open=el.style.display!=='none';
  el.style.display=open?'none':'block';
  if(arr)arr.style.transform=open?'rotate(0deg)':'rotate(90deg)';
}

// ── 核銷勾選 ─────────────────────────────────────────────────
async function setTag(id, tag){
  try{
    await gas('setTag',{id:id,tag:tag});
    // 更新 cache 裡的 tag（不重新 load 整頁，快一點）
    render('cost');
  }catch(e){toast('❌ '+e.message);}
}

// ── 啟動 ─────────────────────────────────────────────────────
(function(){
  var u=getUser();
  if(u){S.user=u;S.page=u.role==='worker'?'w-report':(u.role==='boss'?'cost':'daily');}
  render();
})();
</script>
</body>
